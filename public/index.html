<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>湘阁里辣 · 等位叫号 v2.8</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#2C2C2C;font-size:14px;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;overflow:hidden}

/* 登录页 — 全新设计 */
.login-page{position:fixed;inset:0;z-index:300;background:linear-gradient(135deg,#5C0A0A 0%,#7A1212 50%,#4A0606 100%);display:flex;align-items:center;justify-content:center;padding:20px;transition:opacity .35s}
.login-page.hide{opacity:0;pointer-events:none}
.login-card{border-radius:16px;width:380px;max-width:90vw;padding:36px 32px;background:#fff;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-card img{height:64px;display:block;margin:0 auto 8px}
.login-card h2{font-size:20px;font-weight:700;color:#B22222;margin-bottom:2px}
.login-card .sub{font-size:12px;color:#888;margin-bottom:20px}
.login-card label{display:block;font-size:12px;color:#888;text-align:left;margin:8px 0 3px}
.login-card input{width:100%;padding:10px 14px;border:2px solid #e8e8e8;border-radius:8px;font-size:15px;outline:none;margin-bottom:8px;font-family:inherit;transition:border-color .2s}
.login-card input:focus{border-color:#B22222}
.login-card .err{color:#B22222;font-size:11px;margin-top:4px;display:none}
.login-card .btn-login{width:100%;padding:11px 0;background:linear-gradient(135deg,#B22222,#D4443F);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s,transform .15s}
.login-card .btn-login:hover{opacity:.92;transform:translateY(-1px)}
.login-card .btn-login:active{transform:translateY(0)}
.login-card .btn-login.loading{opacity:.6;pointer-events:none}
.login-card .login-hint{font-size:11px;color:#aaa;margin-top:12px}

.hdr{background:linear-gradient(135deg,#B22222,#8B0000);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-l img{height:32px}
.hdr h1{font-size:16px;font-weight:700}
.hdr .v{font-size:9px;opacity:.5}
.hdr .sub{font-size:11px;opacity:.85;margin-top:2px}
.hdr .hbtns button{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:17px;cursor:pointer}
.pb-wrap{padding:8px 12px;background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:52px;z-index:99}
.pb-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;justify-content:center}
.pb-row button{min-width:36px;height:36px;border-radius:10px;border:2px solid #B22222;background:#fff;color:#B22222;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pb-row button:active{background:#B22222;color:#fff}
.pb-row input{width:52px;height:36px;border-radius:10px;border:2px solid #ddd;text-align:center;font-size:14px;font-weight:700;outline:none}
.pb-row input:focus{border-color:#B22222}
.main{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}

/* 三列区域 */
.cols-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.col-block{display:flex;flex-direction:column}
.col-label{text-align:center;font-weight:700;font-size:13px;padding:7px 0;border-radius:8px 8px 0 0;margin-bottom:0;letter-spacing:1px}
.col-label.ta{background:#FFF3E0;color:#E65100}
.col-label.tb{background:#E8F5E9;color:#2E7D32}
.col-label.tc{background:#E3F2FD;color:#1565C0}
.col-cards{display:flex;flex-direction:column;gap:6px;min-height:40px}
.col-cards .empty-hint{text-align:center;color:#ccc;font-size:11px;padding:12px 0}

/* 等位卡片 */
.qcard{background:#fff;border-radius:10px;padding:10px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f0f0f0;position:relative;transition:box-shadow .15s}
.qcard .qnum{font-size:30px;font-weight:800;color:#B22222;line-height:1.1;margin-bottom:2px}
.qcard .qppl{font-size:13px;font-weight:600;color:#555;margin-bottom:2px}
.qcard .qwait{font-size:10px;color:#999;margin-bottom:6px}
.qcard .qacts{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.qcard .qacts button{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.qcard .qacts .b-call{background:#B22222;color:#fff;min-width:44px}
.qcard .qacts .b-call:active{background:#8B0000}
.qcard .qacts .b-skip{background:#E65100;color:#fff;min-width:44px}
.qcard .qacts .b-skip:active{background:#BF360C}
.qcard .qacts .b-seat{background:#2E7D32;color:#fff;min-width:44px}
.qcard .qacts .b-seat:active{background:#1B5E20}

/* 已叫号卡片 */
.qcard.called{background:#FFFDE7;border-color:#FFD54F;box-shadow:0 0 0 2px #FFC107 inset}
.qcard.called .qnum{color:#E65100}
.qcard .qbadge{display:inline-block;background:#FF9800;color:#fff;font-size:9px;padding:2px 8px;border-radius:3px;margin-bottom:4px;font-weight:600}

/* 已叫号横条 */
.call-badge{display:inline-block;font-size:10px;background:#FFF3E0;color:#E65100;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px;vertical-align:middle}

/* 过号 */
.skip-sec{margin-bottom:12px}
.skip-sec .skip-hd{font-size:11px;color:#999;margin-bottom:4px;padding-left:2px}
.skip-row{display:flex;gap:6px;flex-wrap:wrap}
.skip-chip{padding:4px 12px;border-radius:14px;font-size:11px;background:#f5f5f5;color:#999;border:1px solid #e0e0e0;display:flex;align-items:center;gap:6px}
.skip-chip button{background:none;border:none;color:#999;font-size:14px;cursor:pointer;padding:0 2px;line-height:1}
.skip-chip button:hover{color:#B22222}

/* 历史 */
.hist-block{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.hist-tog{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:10px 12px;font-size:13px;font-weight:600;color:#555}
.hist-tog .arr{transition:transform .2s;font-size:10px;color:#999}
.hist-tog.open .arr{transform:rotate(90deg)}
.hist-wrap{display:none}
.hist-wrap.show{display:block}
.hist-wrap table{width:100%;border-collapse:collapse;font-size:11px}
.hist-wrap th{background:#fafafa;color:#999;padding:6px 4px;font-weight:400;border-bottom:1px solid #eee}
.hist-wrap td{padding:5px 4px;text-align:center;border-bottom:1px solid #f5f5f5}
.hist-wrap td:first-child{font-weight:700;color:#B22222}
.hist-wrap .rbtn{padding:3px 8px;font-size:10px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer}

/* 弹窗 */
.mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.mod.show{display:flex}
.mod-box{background:#fff;width:90%;max-width:360px;border-radius:14px;padding:20px;max-height:85vh;overflow-y:auto}
.mod-box h3{font-size:16px;margin-bottom:12px}
.mod-box label{display:block;font-size:11px;color:#888;margin:6px 0 2px}
.mod-box input[type=text],.mod-box select{width:100%}
.mod-box input[type=text]{padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.mod-box select{padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff}
.mod-tog{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px}
.mod-save{width:100%;padding:10px;background:#B22222;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}

.rov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:180;align-items:center;justify-content:center}
.rov.show{display:flex}
.rcard{background:#fff;border-radius:16px;padding:20px;text-align:center;width:260px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.rcard .qr{width:150px;height:150px;margin:0 auto 6px;background:#f8f8f8;border-radius:8px}
.rcard .bnum{font-size:42px;font-weight:800;color:#B22222;line-height:1.1}
.rcard .btype{font-size:12px;color:#999;margin:2px 0}
.rcard .btime{font-size:11px;color:#aaa;margin-bottom:8px}
.rcard .close-btn{padding:6px 20px;border-radius:8px;border:none;background:#B22222;color:#fff;font-size:13px;cursor:pointer}
.rcard .hint{font-size:10px;color:#B22222;margin-top:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* 平板桌面 */
@media(min-width:900px){
  .main{max-width:1100px;margin:0 auto}
  .qcard .qnum{font-size:36px}
  .qcard .qppl{font-size:14px}
  .cols-wrap{gap:14px}
  .col-cards{gap:8px}
}
@media(max-width:500px){
  .cols-wrap{gap:5px}
  .qcard{padding:8px 5px}
  .qcard .qnum{font-size:22px}
  .qcard .qacts button{padding:4px 6px;font-size:10px}
}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <img src="logo.png" alt="湘阁里辣">
    <h2>等位叫号系统</h2>
    <div class="sub">请登录后操作</div>
    <label>用户名</label>
    <input type="text" id="loginUser" value="xgll2122" placeholder="请输入用户名">
    <label>密码</label>
    <input type="password" id="loginPass" value="2122" placeholder="请输入密码">
    <div class="err" id="loginErr"></div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">登 录</button>
    <div class="login-hint">与包间预订系统共用账号</div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-l">
    <img src="logo.png" alt="湘阁里辣">
    <div><h1>湘阁里辣 · 等位叫号 <span class="v">v2.8</span></h1><div class="sub" id="storeLabel">🔄 连接中...</div></div>
  </div>
  <div class="hbtns"><button onclick="showSettings()">⚙️</button></div>
</div>

<div class="pb-wrap"><div class="pb-row" id="pRow"></div></div>

<div class="main" id="mainScroll">

  <!-- 三列等位区 -->
  <div class="cols-wrap">
    <div class="col-block">
      <div class="col-label ta">小桌 A · 1-2人</div>
      <div class="col-cards" id="colA"><div class="empty-hint">暂无排队</div></div>
    </div>
    <div class="col-block">
      <div class="col-label tb">中桌 B · 3-4人</div>
      <div class="col-cards" id="colB"><div class="empty-hint">暂无排队</div></div>
    </div>
    <div class="col-block">
      <div class="col-label tc">大桌 C · 5人+</div>
      <div class="col-cards" id="colC"><div class="empty-hint">暂无排队</div></div>
    </div>
  </div>

  <!-- 过号 -->
  <div class="hist-block" id="skipSec" style="display:none">
    <div class="hist-tog" onclick="toggleSkip()"><span class="arr" id="skipArr">▶</span> ⏭️ 已过号 <span id="skipCnt" style="font-size:10px;color:#999;font-weight:400"></span></div>
    <div class="hist-wrap" id="skipWrap"><div class="skip-row" id="skipRow" style="padding:8px 12px"></div></div>
  </div>

  <!-- 历史 -->
  <div class="hist-block" id="histBlock">
    <div class="hist-tog" onclick="toggleHist()"><span class="arr">▶</span> 📋 今日记录</div>
    <div class="hist-wrap" id="histWrap"><div style="overflow-x:auto"><table><thead><tr><th>号数</th><th>人数</th><th>状态</th><th>操作</th></tr></thead><tbody id="hBody"><tr><td colspan="4">加载中...</td></tr></tbody></table></div></div>
  </div>

</div>

<!-- 设置弹窗 -->
<div class="mod" id="setMod" onclick="if(event.target===this)closeSettings()">
<div class="mod-box">
<h3>⚙️ 叫号设置</h3>
<label>语音风格</label>
<select id="voiceSel"><option value="0">🎵 情感女声（推荐）</option><option value="1">🍭 甜美</option><option value="2">🎤 沉稳男声</option><option value="3">🔊 自然标准</option></select>
<label>语速: <span id="rateV">0.85</span></label>
<input type="range" id="spRate" min="0.5" max="2.0" step="0.1" value="0.85" oninput="document.getElementById('rateV').textContent=this.value">
<div class="mod-tog"><span>叫号重复次数</span>
<select id="callRepeat"><option value="1">1次</option><option value="2">2次</option><option value="3">3次</option><option value="4">4次</option><option value="5" selected>5次（默认）</option></select></div>
<div class="mod-tog"><span>取号后显示二维码</span><input type="checkbox" id="shQr" checked></div>
<div class="mod-tog"><span>取号后自动打印</span><input type="checkbox" id="autoPrt"></div>
<button class="mod-save" onclick="saveSettings()">💾 保存设置</button>
</div></div>

<!-- 取号结果弹窗 -->
<div class="rov" id="resOv" onclick="if(event.target===this)closeRes()">
<div class="rcard"><img class="qr" id="qrImg" src=""><div class="bnum" id="resNum"></div><div class="btype" id="resType"></div><div class="btime" id="resTime"></div><div class="hint">📸 请顾客截图保存</div><button class="close-btn" onclick="closeRes()">关闭</button></div></div>

<div class="toast" id="toast"></div>

<script>
console.log("queue-system v2.8 init");

const S={token:"",store:"",storeName:"",queues:[],stg:{}};

function genBtns(){
  var h="";
  for(var i=1;i<=10;i++) h+="<button onclick=take("+i+")>"+i+"</button>";
  h+="<input type=number id=bigP placeholder=10+ min=11 max=99>";
  h+="<button onclick=takePlus() style=background:#B22222;color:#fff>取号</button>";
  document.getElementById("pRow").innerHTML=h;
}

function takePlus(){
  var v=parseInt(document.getElementById("bigP").value);
  if(v&&v>0)take(v);
}

async function doLogin(){
  var btn=document.getElementById("btnLogin");
  var errEl=document.getElementById("loginErr");
  var user=document.getElementById("loginUser").value.trim()||"xgll2122";
  var pass=document.getElementById("loginPass").value.trim()||"2122";
  errEl.style.display="none";
  btn.textContent="登录中...";btn.classList.add("loading");
  try{
    var r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,password:pass})});
    var d=await r.json();
    if(!r.ok){errEl.textContent=d.error||"登录失败";errEl.style.display="block";btn.textContent="登 录";btn.classList.remove("loading");return}
    console.log("login ok:",d.username,d.store);
    S.token=d.token;
    S.store=d.store.id||d.store;
    S.storeName=d.storeName||d.store.name||d.store;
    // 隐藏登录页，显示主界面
    document.getElementById("loginPage").classList.add("hide");
    document.getElementById("storeLabel").textContent=S.storeName;
    genBtns();
    await load();
    upWait();
    startSSE();
    setInterval(upWait,5000);
    setInterval(function(){
      if(S.autoPrint)autoPrint();
    },10000);
  }catch(e){
    console.error("login fail:",e);
    errEl.textContent="连接失败，请重试";errEl.style.display="block";
    btn.textContent="登 录";btn.classList.remove("loading");
  }
}

async function login(retry){
  retry=retry||0;
  var el=document.getElementById("storeLabel");
  try{
    console.log("login v2.8 attempt",retry);
    var ctrl=new AbortController();
    var t=setTimeout(function(){ctrl.abort()},8000);
    var r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:"xgll2122",password:"2122"}),signal:ctrl.signal});
    clearTimeout(t);
    var d=await r.json();
    console.log("login ok:",d.username,d.store);
    S.token=d.token;S.store=d.store;S.storeName=d.storeName;
    el.textContent=d.storeName||d.store||"已连接";
  }catch(e){
    console.error("login fail:",e.name,e.message);
    if(retry<2){el.textContent="重试中("+(retry+1)+")...";setTimeout(function(){login(retry+1)},2000)}
    else el.textContent="连接失败 点此重试";
    el.style.cursor="pointer";el.onclick=function(){login(0)}
  }
}

function SSE(){
  try{
    var es=new EventSource("/api/events");
    es.addEventListener("queue_update",function(e){
      try{var d=JSON.parse(e.data);if(d.storeId===S.store)load()}catch(_){}
    });
    es.onerror=function(){es.close();setTimeout(SSE,5000)};
    console.log("SSE connected");
  }catch(e){console.error("SSE failed:",e)}
}

async function load(){
  if(!S.token||!S.store){console.log("load skipped - no auth");return}
  try{
    var r=await fetch("/api/store/"+S.store+"/queue",{headers:{Authorization:"Bearer "+S.token}});
    if(!r.ok){console.error("load failed:",r.status);return}
    S.queues=await r.json();render();
    console.log("loaded",S.queues.length,"queues");
  }catch(e){console.error("load error:",e)}
}

function render(){renderW();renderS();renderH()}

function colName(t){return t==="A"?"小桌":t==="B"?"中桌":"大桌"}

function renderW(){
  var waiting=S.queues.filter(function(q){return q.status==="waiting"||q.status==="called"});
  var byType={A:[],B:[],C:[]};
  waiting.forEach(function(q){
    byType[q.type]=byType[q.type]||[];
    byType[q.type].push(q);
  });
  ["A","B","C"].forEach(function(t){
    var el=document.getElementById("col"+t);
    var list=byType[t]||[];
    if(!list.length){el.innerHTML="<div class=empty-hint>暂无排队</div>";return}
    el.innerHTML=list.map(function(q){
      var ws=' data-ts="'+q.created_at+'"';
      var cc=q.called_count>0?'<span class=call-badge>📣×'+q.called_count+'</span>':'';
      return '<div class=qcard><div class=qnum>'+q.queue_number+'</div><div class=qppl>'+q.people+'人 '+cc+'</div><div class=qwait'+ws+'>0分钟</div><div class=qacts><button class=b-call onclick=doCall("'+q.id+'")>叫号</button><button class=b-skip onclick=doSkip("'+q.id+'")>过号</button><button class=b-seat onclick=doSeat("'+q.id+'")>入座</button></div></div>';
    }).join("");
  });
}

function typeLabel(t){return t==="A"?"1-2人":t==="B"?"3-4人":"5人以上"}

function renderS(){
  var skipped=S.queues.filter(function(q){return q.status==="skipped"});
  var sec=document.getElementById("skipSec");
  if(!skipped.length){sec.style.display="none";return}
  sec.style.display="block";
  document.getElementById("skipCnt").textContent="("+skipped.length+")";
  document.getElementById("skipRow").innerHTML=skipped.map(function(q){
    return '<div class=skip-chip>'+q.queue_number+' '+q.people+'人 <button onclick=doCancel("'+q.id+'") title=撤号>✕</button></div>';
  }).join("");
}

function renderH(){
  var sm={waiting:"等位中",seated:"已入座",skipped:"已过号",cancelled:"已取消"};
  document.getElementById("hBody").innerHTML=S.queues.slice().reverse().map(function(q){
    var st=sm[q.status]||q.status;
    if(q.status==="waiting"&&q.called_count>0)st="已叫"+q.called_count+"次";
    var cancelBtn=q.status==="waiting"?'<button class=rbtn onclick=doCancel("'+q.id+'")>撤号</button>':"";
    return "<tr><td>"+q.queue_number+"</td><td>"+q.people+"人</td><td>"+st+"</td><td>"+cancelBtn+"</td></tr>";
  }).join("");
}

async function take(people){
  if(!people||people<1)return;
  try{
    var r=await fetch("/api/store/"+S.store+"/queue",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+S.token},body:JSON.stringify({people:people})});
    var d=await r.json();
    if(!r.ok){toast(d.error||"失败");return}
    if(S.stg.showQr!==false)showRes(d);
    else toast("取号: "+d.queue_number+"号");
    if(S.stg.autoPrint)autoP(d);
    document.getElementById("bigP").value="";
    await load();
  }catch(e){toast("取号失败")}
}

function showRes(r){
  document.getElementById("qrImg").src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+encodeURIComponent(location.origin+"/s.html?n="+r.queue_number+"&t="+r.type+"&tm="+encodeURIComponent(new Date(r.created_at).toLocaleString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}))+"&s="+encodeURIComponent(S.storeName));
  document.getElementById("resNum").textContent=r.queue_number;
  document.getElementById("resType").textContent=typeLabel(r.type);

async function doCall(id){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  try{
    var r=await fetch("/api/store/"+S.store+"/queue/"+id+"/call",{method:"POST",headers:{Authorization:"Bearer "+S.token}});
    var d=await r.json();
    if(!r.ok){toast(d.error||"失败");return}
    var t=d.queue_number+",湘阁里辣请您用餐了！";
    speak(t,S.stg.repeat||5);
    await load();
  }catch(e){toast("叫号失败")}
}

function speak(text,times){
  times=times||1;
  if(!window.speechSynthesis)return;
  // A39 → 诶 39（替换A为中文字"诶"，数字连读更自然）
  text=text.replace(/A/g,"诶");
  text=text.replace(/([BC])(\d+)/g,"$1 $2");
  text=text.replace(/诶(\d+)/g,"诶 $1");
  var repeat=0,cnt=times||1;
  function loop(){
    if(repeat>=cnt)return;
    repeat++;
    var ut=new SpeechSynthesisUtterance(text);
    ut.lang="zh-CN";ut.rate=S.stg.speechRate||0.85;ut.volume=1;
    var pm=[1.0,1.1,0.92,1.0];
    ut.pitch=pm[parseInt(S.stg.voice)]||1.0;
    var vv=window.speechSynthesis.getVoices();
    var v=vv.find(function(v){return v.name==="Ting-Ting"&&v.lang.includes("zh")})||
          vv.find(function(v){return v.name.includes("Tingting")&&v.lang.includes("zh")})||
          vv.find(function(v){return v.name.includes("Google 普通话")&&v.lang.includes("zh")})||
          vv.find(function(v){return v.lang.includes("zh-CN")})||
          vv.find(function(v){return v.lang.includes("zh")});
    if(v)ut.voice=v;
    ut.onend=function(){setTimeout(loop,200)};
    try{window.speechSynthesis.speak(ut)}catch(e){}
  }
  loop();
}

}
