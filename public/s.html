<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>湘阁里辣 · 等位凭证</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#B22222 0%,#C62828 40%,#f5f5f5 40%);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0 20px}
.logo-wrap{padding:40px 0 30px;color:#fff;text-align:center}
.logo-wrap .icon{font-size:44px;display:block;margin-bottom:6px}
.logo-wrap h1{font-size:26px;font-weight:800;letter-spacing:4px}
.logo-wrap .sub{font-size:11px;opacity:.65;margin-top:4px;letter-spacing:2px}
.card{background:#fff;border-radius:18px;padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08)}
.card .label{font-size:13px;color:#B22222;font-weight:700;margin-bottom:4px;letter-spacing:2px}
.card .num{font-size:80px;font-weight:900;color:#B22222;line-height:1;margin:8px 0 4px}
.card .type-badge{display:inline-block;padding:3px 14px;border-radius:10px;font-size:12px;font-weight:700;margin-bottom:16px}
.card .type-badge.A{background:#FFF3E0;color:#E65100}
.card .type-badge.B{background:#E8F5E9;color:#2E7D32}
.card .type-badge.C{background:#E3F2FD;color:#1565C0}
.card .time{font-size:14px;color:#666;margin-bottom:18px}
.card .divider{height:1px;background:linear-gradient(90deg,transparent,#ddd,transparent);margin:16px 0}
.card .tip{font-size:11px;color:#999;line-height:1.6}
</style>
</head>
<body>
<div class="logo-wrap">
  <span class="icon">🍜</span>
  <h1>湘阁里辣</h1>
  <div class="sub">等 位 凭 证</div>
</div>
<div class="card">
  <div class="label">等 位 号</div>
  <div class="num" id="qNum">--</div>
  <div class="type-badge" id="qTypeBdg">--</div>
  <div class="time" id="qTime">--</div>
  <div class="divider"></div>
  <div class="tip">📸 请截图保存<br>叫号时出示此页面</div>
</div>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var n=p.get('n')||'--';
  var t=p.get('t')||'';
  var tm=p.get('tm')||'';
  var tb={'A':'A区 · 1-2人','B':'B区 · 3-4人','C':'C区 · 5人以上'};
  document.getElementById('qNum').textContent=n;
  var bdg=document.getElementById('qTypeBdg');
  bdg.textContent=tb[t]||t||'';
  bdg.className='type-badge '+t;
  document.getElementById('qTime').textContent='取号时间：'+tm;
})();
</script>
</body>
</html>
