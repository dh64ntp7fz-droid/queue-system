<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>湘阁里辣 · 扫码取号</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(180deg, #B22222 0%, #8B0000 40%, #f5f5f5 40%);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
}
.logo { padding: 20px 0 10px; text-align: center; }
.logo img { height: 70px; display: block; margin: 0 auto 8px; }
.logo .sub { font-size: 11px; opacity: .7; margin-top: 2px; color: #fff; }

/* Form */
.form-card {
  background: #fff; border-radius: 14px; padding: 20px; width: 90%; max-width: 340px;
  box-shadow: 0 4px 20px rgba(0,0,0,.1); margin-bottom: 20px;
}
.form-card label { font-size: 12px; color: #888; display: block; margin: 8px 0 3px; }
.form-card .label-main { font-size: 14px; color: #333; font-weight: 700; margin-top: 0; }
.people-btns { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.people-btns button {
  width: 40px; height: 40px; border-radius: 10px; border: 2px solid #B22222;
  background: #fff; color: #B22222; font-size: 16px; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.people-btns button:active { background: #B22222; color: #fff; }
.people-btns input {
  width: 46px; height: 40px; border-radius: 10px; border: 2px solid #ccc;
  text-align: center; font-size: 14px; outline: none; font-weight: 700;
}
.form-card input[type=tel] {
  width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px;
  font-size: 15px; outline: none; margin-top: 4px;
}
.form-card input[type=tel]:focus { border-color: #B22222; }
.type-preview {
  padding: 8px; border-radius: 8px; text-align: center; font-size: 13px;
  font-weight: 700; margin: 8px 0; background: #FFF3E0; color: #E65100;
}
.take-btn {
  width: 100%; padding: 12px; background: #B22222; color: #fff; border: none;
  border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
  -webkit-tap-highlight-color: transparent;
}
.take-btn:active { background: #8B0000; }

/* Result */
.result-card {
  background: #fff; border-radius: 14px; padding: 20px; width: 90%; max-width: 340px;
  box-shadow: 0 4px 20px rgba(0,0,0,.1); text-align: center; display: none;
  margin-bottom: 20px;
}
.result-card.show { display: block; }
.result-card .qr { width: 160px; height: 160px; margin: 0 auto 8px; background: #f8f8f8; border-radius: 8px; }
.result-card .num { font-size: 52px; font-weight: 800; color: #B22222; line-height: 1.1; }
.result-card .type-label { font-size: 14px; color: #999; margin: 4px 0; }
.result-card .time-label { font-size: 13px; color: #888; margin-bottom: 6px; }
.result-card .hint { font-size: 11px; color: #B22222; font-weight: 600; margin: 8px 0; }
.result-card .new-btn {
  padding: 8px 24px; background: #f0f0f0; border: none; border-radius: 8px;
  font-size: 13px; cursor: pointer; color: #666;
}
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 8px 20px; border-radius: 20px;
  font-size: 13px; z-index: 999; opacity: 0; transition: .3s; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="logo">
  <img src="logo.png" alt="湘阁里辣">
  <div class="sub" id="storeLabel">扫码取号</div>
</div>

<!-- Form -->
<div class="form-card" id="formCard">
  <div class="label-main">👥 用餐人数</div>
  <div class="people-btns" id="scanPeopleBtns"></div>
  <div class="type-preview" id="typePreview">👥 选择人数自动分配号段</div>
  <label>📱 手机号码（接收叫号通知）</label>
  <input type="tel" id="phone" placeholder="输入手机号" maxlength="11">
  <button class="take-btn" onclick="doTake()">🎫  我要取号</button>
</div>

<!-- Result -->
<div class="result-card" id="resultCard">
  <img class="qr" id="qrImg" src="" alt="QR">
  <div class="num" id="resNum"></div>
  <div class="type-label" id="resType"></div>
  <div class="time-label" id="resTime"></div>
  <div class="hint">📸 请截图保存，叫号时出示</div>
  <button class="new-btn" onclick="resetForm()">再取一个号</button>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
const storeId = params.get('store') || 'dalang';
let currentPeople = 2;

// People buttons
(function() {
  let html = '';
  for (let i=1; i<=10; i++) html += `<button onclick="selectPeople(${i})" id="pBtn${i}">${i}</button>`;
  html += '<input type="number" id="customPpl" placeholder="10+" min="11" max="99" oninput="selectPeople(parseInt(this.value)||0)">';
  document.getElementById('scanPeopleBtns').innerHTML = html;
  selectPeople(2);
})();

function selectPeople(n) {
  currentPeople = n;
  document.querySelectorAll('#scanPeopleBtns button').forEach(b => b.style.background='');
  const btn = document.getElementById('pBtn'+n);
  if (btn) { btn.style.background = '#B22222'; btn.style.color = '#fff'; }
  else document.getElementById('customPpl').value = n||'';

  const preview = document.getElementById('typePreview');
  if (n === 1 || n === 2) { preview.textContent = '🏷️ A区 · 1-2人'; preview.style.background='#E3F2FD'; preview.style.color='#1565C0'; }
  else if (n >= 3 && n <= 4) { preview.textContent = '🏷️ B区 · 3-4人'; preview.style.background='#FFF3E0'; preview.style.color='#E65100'; }
  else if (n >= 5) { preview.textContent = '🏷️ C区 · 5人以上'; preview.style.background='#F3E5F5'; preview.style.color='#6A1B9A'; }
  else { preview.textContent = '🏷️ 自动分配'; preview.style.background='#f5f5f5'; preview.style.color='#999'; }
}

async function doTake() {
  const phone = document.getElementById('phone').value.trim();
  if (!phone) { toast('请输入手机号码'); return; }
  if (!/^1\d{10}$/.test(phone)) { toast('手机号格式不对'); return; }
  if (!currentPeople || currentPeople < 1) { toast('请选择人数'); return; }

  try {
    const r = await fetch(`/api/store/${storeId}/scan-queue`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ phone, people:currentPeople })
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error||'取号失败'); return; }

    // 显示结果
    const typeMap = { A:'A区 · 1-2人', B:'B区 · 3-4人', C:'C区 · 5人以上' };
    document.getElementById('resNum').textContent = d.queue_number;
    document.getElementById('resType').textContent = typeMap[d.type] || '';
    document.getElementById('resTime').textContent = '取号: ' + new Date(d.created_at).toLocaleString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('qrImg').src='https://api.qrserver.com/v1/create-qr-code/?size=160x160&data='+encodeURIComponent(location.origin+'/s.html?n='+d.queue_number+'&t='+d.type+'&tm='+encodeURIComponent(new Date(d.created_at).toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})));
    document.getElementById('resultCard').classList.add('show');
    document.getElementById('formCard').style.display = 'none';
  } catch(e) { toast('取号失败'); }
}

function resetForm() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('formCard').style.display = '';
  document.getElementById('phone').value = '';
}

let _t;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_t); _t = setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
